services:
  5mouse-app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASE_PATH: /5mouse
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - BASE_PATH=/5mouse
      - DATABASE_URL=postgresql://postgres:postgres@5mouse-postgres:5432/platform?schema=public
      - REDIS_URL=redis://5mouse-redis:6379
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_URL=https://needcitrus.com/5mouse
      - AUTH_GITHUB_ID=${AUTH_GITHUB_ID}
      - AUTH_GITHUB_SECRET=${AUTH_GITHUB_SECRET}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-${AUTH_SECRET}}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_BASE_PATH=/5mouse
      - DATA_DIR=/data
    volumes:
      - project-data:/data
    depends_on:
      5mouse-postgres:
        condition: service_healthy
      5mouse-redis:
        condition: service_healthy
    networks:
      - default
      - citrushub-net
    restart: unless-stopped

  5mouse-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  5mouse-redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  project-data:
  postgres-data:
  redis-data:

networks:
  citrushub-net:
    external: true
